<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter Tool - FreeToolBox</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

/* TOOL CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

textarea{
width:100%;
height:200px;
padding:15px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.result{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.box{
background:white;
padding:20px;
flex:1;
margin:5px;
text-align:center;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

footer{
text-align:center;
padding:20px;
background:#111;
color:white;
margin-top:40px;
}

</style>
</head>


<body>

<header>

<div><b>FreeToolBox</b></div>

<nav>
<a href="index.html">Home</a>
<a href="#">Tools</a>
<a href="#">Blog</a>
</nav>

</header>


<div class="container">

<h1>Word Counter Tool</h1>

<p>Count words, characters and sentences instantly.</p>

<textarea id="text" placeholder="Type or paste your text here..."></textarea>

<div class="result">

<div class="box">
<h2 id="words">0</h2>
<p>Words</p>
</div>

<div class="box">
<h2 id="characters">0</h2>
<p>Characters</p>
</div>

<div class="box">
<h2 id="sentences">0</h2>
<p>Sentences</p>
</div>

</div>

</div>


<footer>

<p>© 2026 FreeToolBox</p>

</footer>


<script>

const text = document.getElementById("text");

text.addEventListener("input",function(){

let content = text.value;

let words = content.trim().split(/\s+/).filter(function(word){
return word.length>0;
});

document.getElementById("words").innerText = words.length;

document.getElementById("characters").innerText = content.length;

let sentences = content.split(/[.!?]+/).filter(function(s){
return s.trim().length>0;
});

document.getElementById("sentences").innerText = sentences.length;

});

</script>

</body>
</html>
